<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script defer src="./assets/js/main.js"></script>
        <!--Boostrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>SegundaEntregaNadiaBrizuela</title>
</head>
<body>
    <header class="bloque-inicio">
        <div>
            <img id="imagen-principal" src="./assets/img/ControlDeIngresosyEgresos.webp" alt="logo.webp">
            <h1>Control de Ingresos y Egresos</h1>
            <h2>Bienvenido, a tu Reporte de Ahorros!</h2>
        </div>
    </header>
    <div>
        <form class="form-container form-movimiento">
            <h3>Ingreso Del Mes</h3>
            <input type="hidden" name="tipoDeRegistro" value="Ingreso" />
            <input type="date" name="date">
            <input type="number" name="monto" step="0.01" placeholder="Monto">
            <select name="catalogo" class="catalogo-detalle">
                <option value="">Seleccione un tipo</option>
            </select>
            <button type="submit">Guardar</button>
        </form>
    </div>
    <div>
        <form class="form-container form-movimiento">
            <h3>Egreso Del Mes</h3>
            <input type="hidden" name="tipoDeRegistro" value="Egreso" />
            <input type="date" name="date">
            <input type="number" name="monto" step="0.01" placeholder="Monto">
            <select name="catalogo" class="catalogo-detalle">
                <option value="">Seleccione un tipo</option>
            </select>
            <button type="submit">Guardar</button>
        </form>
    </div>
    <div>
        <form class="form-container form-movimiento">
            <h3>Ingreso Extraordinario</h3>
            <input type="hidden" name="tipoDeRegistro" value="IngresoExtra" />
            <input type="date" name="date">
            <input type="number" name="monto" step="0.01" placeholder="Monto">
            <select name="catalogo" class="catalogo-detalle">
                <option value="">Seleccione un tipo</option>
            </select>
            <button type="submit">Guardar</button>
        </form>   
    </div>
    <div>
        <form class="form-container form-movimiento">
            <h3>Egreso Extraordinario</h3>
            <input type="hidden" name="tipoDeRegistro" value="EgresoExtra" />
            <input type="date" name="date">
            <input type="number" name="monto" step="0.01" placeholder="Monto">
            <select name="catalogo" class="catalogo-detalle">
                <option value="">Seleccione un tipo</option>
            </select>
            <button type="submit">Guardar</button>
        </form>
    </div>
    <section>
        <div>
            <a href="#" id="modificar" class="btn modificarRegistros">Modificar Registros</a>
            <a href="#" id="versaldo" class="btn generarResultadosIngresos">Ver Saldos Generales</a>
        </div>
    </section>
</body>
</html>

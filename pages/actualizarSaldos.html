<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script defer src="../assets/js/main.js"></script>
    <script defer src="../assets/js/actualizarSaldos.js"></script>
    <script defer src="../assets/js/resultado.js"></script>
    <!--Boostrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>SegundaEntregaNadiaBrizuela</title>
</head>
<body>
    <header class="bloque-inicio">
        <div>
            <img id="imagen-principal" src="../assets/img/ControlDeIngresosyEgresos.webp" alt="logo.webp">
            <h1>Control de Ingresos y Egresos</h1>
            <h2>Actualización de saldos</h2>
            <section>
                <a class="btn buttonDeInicio" aria-current="page" href="../index.html">Inicio</a>
            </section>
        </div>
    </header>
    <div>
        <form id="buscarPorFecha" class="form-container">
            <h3>Seleccione Fecha y Tipo a Modificar</h3>
            <input type="date" id="ingresosDate">
            <!-- utilizo la base de datos que arme con los tipos de gastos e ingresos -->
            <button type="submit">Buscar</button>
            <ul id="listaRegistrosCargados"></ul>
        </form>
    </div>
    <div>
        <form id="formEditarRegistro" class="form-container">
            <h3>Editar monto</h3>
            <input type="number" id="nuevoMonto" step="0.01">
            <button id="guardarCambio" type="submit">Guardar</button>
        </form>
        <form  class="form-container">
            <button id="refrescarPagina">Refrescar</button>
        </form>
    </div>
    <div>
        <div class="form-container">
            <button id="verListadoTotalIngresosEgresos">Listar</button>
            <ul id="listaRegistros"></ul>
        </div>
    </div>
</body>
</html>
